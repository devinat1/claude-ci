name: 'Claude CI Reviewer'
description: 'Automated code review against Clean Code, OOP, DDD, and Scalability principles'
author: 'devinat1'

inputs:
  anthropic_api_key:
    description: 'Anthropic API key'
    required: true
  github_token:
    description: 'GitHub token with repo and pull request permissions'
    required: false
  model:
    description: 'Claude model to use (e.g., claude-sonnet-4-6, claude-opus-4-6)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Copy review principles to workspace
      shell: bash
      run: |
        mkdir -p .claude-ci-review/principles
        cp "${{ github.action_path }}/.claude/principles/"* .claude-ci-review/principles/
        cp "${{ github.action_path }}/.claude/review-prompt.md" .claude-ci-review/review-prompt.md

    - name: Run Claude Code Review
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        github_token: ${{ inputs.github_token }}
        claude_args: ${{ inputs.model != '' && format('--model {0} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob"', inputs.model) || '--allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob"' }}
        prompt: |
          REPO: ${{ github.repository }}
          PR NUMBER: ${{ github.event.pull_request.number }}

          Read the file `.claude-ci-review/review-prompt.md` for your full review instructions.
          Then read each file in the `.claude-ci-review/principles/` directory.
          Follow the instructions exactly.

    - name: Clean up review files
      if: always()
      shell: bash
      run: rm -rf .claude-ci-review
