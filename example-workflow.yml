## Copy this file to your repo at .github/workflows/claude-review.yml

name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: devinat1/claude-ci@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
